version: '3.9'

services:

  mongodb:
    image: mongo:7.0
    container_name: middlewareengine-mongo
    restart: unless-stopped
    network_mode: host
    environment:
      MONGO_INITDB_DATABASE: MiddlewareEngineDB
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  middlewareengine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: middlewareengine-app
    restart: unless-stopped
    network_mode: host
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:9091
      MongoDbSettings__ConnectionString: mongodb://localhost:27017
      MongoDbSettings__DatabaseName: MiddlewareEngineDB
      MongoDbSettings__FunctionDefinitionsCollectionName: FunctionDefinitions
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
